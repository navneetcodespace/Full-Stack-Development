<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Form</title>
    </head>

    <body>
        <h2>Forms in HTML</h2>
        <form action="./Moon.jpg">
            <label for="FirstName"> Enter Your First Name :</label>
            <input id="FirstName" type="text" minlength="5" maxlength="10"
                required placeholder="Your First Name " />
            <!--By Default 30 characters-->

            <br><br>

            <label for="LastName">Enter Your Last Name :</label>
            <input id="LastName" type="text" minlength="5" maxlength="10" />

            <br><br>

            <label for="Age">Age :</label>
            <input id="Age" type="number" />

            <br><br>

            <label for="DOJ">Date Of Joining :</label>
            <input id="DOJ" type="date" />

            <br><br>

            <label for="Email">Email :</label>
            <input id="Email" type="email" />

            <br><br>

            <label for="Pass">Password :</label>
            <input id="Pass" type="password" />

            <br><br>

            <p>Enter Your Shirt Size:</p>
            <input type="radio" name="shirtsize" id="small" /> <label
                for="small">Small Size</label>
            <input type="radio" name="shirtsize" id="Medium" /> <label
                for="Medium">Medium Size</label>
            <input type="radio" name="shirtsize" id="Large" /> <label
                for="Large">Large Size</label>

            <br><br>

            <p>Select the known languages:</p>
            <input type="checkbox" name="language" id="eng" /> <label
                for="eng">English</label>
            <input type="checkbox" name="language" id="hindi" /> <label
                for="hindi">Hindi</label>
            <input type="checkbox" name="language" id="urdu" /> <label
                for="urdu">Urdu</label>

            <br><br>

            <label for="color">Choose Your Color :</label>
            <input type="color" id="color">

            <br><br>

            <label for="payment">Choose Your Payment Mathods :</label>
            <select name id="payment">
                <option value></option>
                <option value>Gpay</option>
                <option value>PhonePay</option>
                <option value>BHIM</option>
            </select>

            <br><br>

            <label for="feedback">Please Provide Your Feedback!</label>
            <textarea name="cmt" id="feedback" rows="18" cols="80"
                placeholder="Please Enter Your Feedback"></textarea>

            <br><br>

            <input type="reset" />
            <input type="submit" />
        </form>
    </body>

</html>
