<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Table_Tags</title>
    </head>
    <body>
        <table>
            <tr>
                <th>Name</th>
                <th>Age</th>
            </tr>
            <tr>
                <td>Navneet</td>
                <td>22</td>
            </tr>
        </table>
        <table border="1">
            <tr>
                <th colspan="2">Details</th>
            </tr>
            <tr>
                <td rowspan="2">Navneet</td>
                <td>22</td>
            </tr>
        </table>
    </body>
</html>
