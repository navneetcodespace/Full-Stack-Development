<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>CSS Units Demo</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>

        <h1>CSS Units Example</h1>

        <div class="box-px">
            px Unit (Fixed Size Box)
        </div>

        <div class="box-percent">
            % Unit (50% Width)
        </div>

        <div class="box-em">
            em Unit (Relative to Parent)
        </div>

        <div class="box-rem">
            rem Unit (Relative to Root)
        </div>

        <div class="box-vh-vw">
            vh/vw Unit (Viewport Based)
        </div>

    </body>
</html>
